  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    overflow-x: hidden;

  #bg-canvas {

  .noise {

  .page {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
  }

  .card {
    width: 100%;
    max-width: 440px;

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }

  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    animation-delay: 0.05s;
  }

  .avatar-wrap {
    position: relative;
    width: 90px;
    height: 90px;
  }

  .avatar-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent));
    animation: spin 4s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar-inner {
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .avatar-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #2a1a4a, #1a0a2a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    border-radius: 50%;
  }

  .online-dot {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #4ade80;
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px #4ade80aa;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }

  .username {
    font-family: 'Syne', sans-serif;
    font-size: 22px;

  .badges {

  .badge {

  .stat {

  .stat-num {

  .stat-label {

  .stat-divider {

  .music-player {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    animation-delay: 0.1s;

  .music-player:hover { border-color: var(--border-hover); }

  .music-thumb {
    width: 42px;
    height: 42px;
    border-radius: 8px;
    background: linear-gradient(135deg, #2a1a4a, #4a1a3a);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    position: relative;
    overflow: hidden;

  .music-thumb::after {
    content: '';

  .music-title {

  .music-bars {

    height: 20px;
    flex-shrink: 0;

    width: 3px;
    border-radius: 2px;

  .bar:nth-child(1) { height: 8px;  animation-delay: 0.0s; }
  .bar:nth-child(2) { height: 16px; animation-delay: 0.15s; }
  .bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  .bar:nth-child(4) { height: 20px; animation-delay: 0.1s; }
  .bar:nth-child(5) { height: 6px;  animation-delay: 0.25s; }

<script>
(function(){
  const canvas = document.getElementById('water-canvas');
  const ctx    = canvas.getContext('2d');

  let W, H;
  const mouse = { x: -999, y: -999 };

  const COUNT     = 90;
  const LINK_DIST = 150;
  const REPEL_R   = 130;
  const pts       = [];

  function Particle() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.r  = Math.random() * 2 + 1;
  }

  function init() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    pts.length = 0;
    for (let i = 0; i < COUNT; i++) pts.push(new Particle());
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);

    // ── update positions ──────────────────────────────────────────────────
    for (const p of pts) {
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < REPEL_R * REPEL_R && d2 > 0) {
        const d = Math.sqrt(d2);
        const f = (REPEL_R - d) / REPEL_R * 0.1;
        p.vx += dx / d * f;
        p.vy += dy / d * f;
      }
      p.vx *= 0.97; p.vy *= 0.97;
      p.x  += p.vx; p.y  += p.vy;
      if (p.x < 0) p.x = W; else if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; else if (p.y > H) p.y = 0;
    }

    // ── particle ↔ particle connections ──────────────────────────────────
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < LINK_DIST) {
          ctx.globalAlpha = (1 - d / LINK_DIST) * 0.55;
          ctx.strokeStyle = '#b48cff';
          ctx.lineWidth   = 0.9;
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.stroke();
        }
      }
    }

    // ── cursor → nearest particles ────────────────────────────────────────
    for (const p of pts) {
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      const R  = LINK_DIST * 1.6;
      if (d < R) {
        ctx.globalAlpha = (1 - d / R) * 0.75;
        ctx.strokeStyle = '#ff8cca';
        ctx.lineWidth   = 1.1;
        ctx.beginPath();
        ctx.moveTo(mouse.x, mouse.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }
    }

    // ── cursor soft glow ──────────────────────────────────────────────────
    if (mouse.x > 0) {
      const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 80);
      g.addColorStop(0, 'rgba(180,140,255,0.18)');
      g.addColorStop(1, 'rgba(180,140,255,0)');
      ctx.globalAlpha = 1;
      ctx.fillStyle   = g;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 100, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── dots ──────────────────────────────────────────────────────────────
    for (const p of pts) {
      ctx.globalAlpha = 0.9;
      ctx.fillStyle   = '#b48cff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }

  init();
  window.addEventListener('resize', init);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

  loop();
})();
</script>
